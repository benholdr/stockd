# docker-compose.yml

version: '3'
services:   
  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      API_URL: http://localhost:3000/
    depends_on:
      - rest-server
      
  rest-server:
    image: postgrest/postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_SERVER_HOST: 0.0.0.0 # necessary for `postgrest --ready` flag to work
      PGRST_DB_URI: postgres://app_user:password@db:5432/app_db
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: web_anon
    depends_on:
      - db
  
  mcps-server:
    image: crystaldba/postgres-mcp
    ports:
      - "8000:8000" 
    environment:
      DATABASE_URI: postgres://app_user:password@db:5432/app_db
    depends_on:
      - db
      
  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080

  db:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password  
    volumes:
      - "./pgdata:/var/lib/postgresql"
